system: new_system
data:
  potential_data: data/raw/new_system/kr2_cep_bsse.csv
  experimental_data: data/raw/new_system/experimental_coef_virial_kr2.csv
  r_column: r(angstrom)
  energy_column: E_int_noCP(kcal/mol)
  temperature_column: Temperatura (K)
  b2_column: B2 (cm3/mol)
models:
  potentials:
  - lj
integrators:
  names:
  - scipy_quad
  - gaussian
  - monte_carlo
units:
  distance_unit: angstrom
  energy_unit: kcal/mol
b2:
  r_min: 2.5
  r_max: 30.0
partitioned:
  enabled: true
  r1: 3.0
  r2: 4.0
  r3: 14.0
  r4: 30.0
  integrator_b2:
    name: gaussian
    n_points: 6
  integrator_b3:
    name: gaussian
    n_points: 10
  integrator_b4:
    name: gaussian
    n_points: 24
outputs:
  results_dir: data/results/new_system_streamlit
  figures_dir: outputs/figures/new_system_streamlit
  reports_dir: outputs/reports/new_system_streamlit
run:
  fit: false
  b2: false
  validate: false
  partitioned: true
  method_comparison: true
  monte_carlo_plots: true
  final_outputs: true
