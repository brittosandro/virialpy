system: Kr2

data:
  potential_data: data/raw/kr2/kr2_cep_bsse.csv
  experimental_data: data/raw/kr2/experimental_coef_virial_kr2.csv
  r_column: "r(angstrom)"
  energy_column: "E_int_CP(kcal/mol)"
  temperature_column: "Temperatura (K)"
  b2_column: "B2 (cm3/mol)"

models:
  potentials:
    - all

integrators:
  names:
    - all

units:
  distance_unit: angstrom
  energy_unit: kcal/mol

b2:
  r_min: 2.5
  r_max: 30.0

partitioned:
  enabled: true
  r1: 3.2
  r2: 4.0
  r3: 14.0
  r4: 30.0
  integrator_b2:
    name: gaussian
    n_points: 6
  integrator_b3:
    name: gaussian
    n_points: 10
  integrator_b4:
    name: gaussian
    n_points: 24

outputs:
  results_dir: data/results/kr2_config
  figures_dir: outputs/figures/kr2_config
  reports_dir: outputs/reports/kr2_config

run:
  fit: true
  b2: true
  validate: true
  partitioned: true
  method_comparison: true
  monte_carlo_plots: true
  final_outputs: true
